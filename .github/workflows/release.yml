name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package
        run: zip -r degiro-importer.zip dist/ manifest.json README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: degiro-importer.zip
          generate_release_notes: true
