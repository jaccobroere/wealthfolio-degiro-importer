name: Release DEGIRO

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout the full tagged history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.34.5

      - name: Set up Node 22
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - name: Validate tag, ancestry, and versions
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          tag_sha="$(git rev-parse "refs/tags/$tag^{commit}")"
          [[ "$tag_sha" == "$(git rev-parse HEAD)" ]]
          git fetch origin main --no-tags
          git merge-base --is-ancestor "$tag_sha" origin/main
          package_version="$(node -p "require('./package.json').version")"
          manifest_version="$(node -p "require('./manifest.json').version")"
          [[ "$package_version" == "${tag#v}" && "$manifest_version" == "$package_version" ]]
          test -f "docs/releases/$package_version.md"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Main CI and the local release gate cover tests. This job packages the
      # tagged main commit and publishes that exact archive.
      - name: Package release archive
        run: pnpm package

      - name: Refuse an existing release
        shell: bash
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then echo "Release already exists." >&2; exit 1; fi

      - name: Publish immutable assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" "artifacts/wealthfolio-degiro-importer-$(node -p "require('./package.json').version").zip" artifacts/SHA256SUMS --title "${GITHUB_REF_NAME}" --notes-file "docs/releases/$(node -p "require('./package.json').version").md"
