name: Release DEGIRO

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout the full tagged history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.34.5

      - name: Set up Node 22
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - name: Validate tag, ancestry, and versions
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          tag_sha="$(git rev-parse "refs/tags/$tag^{commit}")"
          [[ "$tag_sha" == "$(git rev-parse HEAD)" ]]
          git fetch origin main --no-tags
          git merge-base --is-ancestor "$tag_sha" origin/main
          package_version="$(node -p "require('./package.json').version")"
          manifest_version="$(node -p "require('./manifest.json').version")"
          [[ "$package_version" == "${tag#v}" && "$manifest_version" == "$package_version" ]]
          test -f "docs/releases/$package_version.md"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Real-statement acceptance is a private pre-tag gate and is deliberately
      # not run in GitHub Actions. CI uses synthetic fixtures only.
      - name: Run synthetic verification and privacy/history gate
        run: pnpm verify

      - name: Build twice and validate deterministic release
        shell: bash
        run: |
          set -euo pipefail
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          pnpm clean
          pnpm build
          pnpm package:addon
          cp "artifacts/$package_name-$package_version.zip" /tmp/release-one.zip
          cp artifacts/SHA256SUMS /tmp/release-one.SHA256SUMS
          pnpm clean
          pnpm build
          pnpm package:addon
          cmp /tmp/release-one.zip "artifacts/$package_name-$package_version.zip"
          cmp /tmp/release-one.SHA256SUMS artifacts/SHA256SUMS
          pnpm validate:package

      - name: Refuse an existing release
        shell: bash
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then echo "Release already exists." >&2; exit 1; fi

      - name: Publish immutable assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" "artifacts/wealthfolio-degiro-importer-$(node -p "require('./package.json').version").zip" artifacts/SHA256SUMS --title "${GITHUB_REF_NAME}" --notes-file "docs/releases/$(node -p "require('./package.json').version").md"
